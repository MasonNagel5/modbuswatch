name: ModbusWatch Detection

on: [push, pull_request]

jobs:
  detect:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: pip install pymodbus==3.7.0 pytest

      - name: Run unit tests
        run: python3 -m pytest tests/ -q

      - name: Install Zeek
        run: |
          echo 'deb http://download.opensuse.org/repositories/security:/zeek/xUbuntu_22.04/ /' | sudo tee /etc/apt/sources.list.d/security:zeek.list
          curl -fsSL https://download.opensuse.org/repositories/security:zeek/xUbuntu_22.04/Release.key | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/security_zeek.gpg > /dev/null
          sudo apt-get update
          sudo apt-get install -y zeek
          echo "/opt/zeek/bin" >> "$GITHUB_PATH"

      - name: Run Zeek detection on the sample capture
        run: zeek -C -r traffic.pcap zeek/modbus_detect.zeek

      - name: Grade detections against ground truth
        run: python3 src/evaluate.py
